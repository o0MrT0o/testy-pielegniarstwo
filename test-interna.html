var S={phase:"menu",qq:[],cur:0,sel:null,conf:false,ans:{},sc:0,done:0,n:78,filt:"all"};

function shuf(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function cats(){var r=[];Q.forEach(function(q){if(r.indexOf(q.c)<0)r.push(q.c);});return r;}
function catQ(qq,cat){return qq.filter(function(q){return q.c===cat;});}

function goMenu(){S.phase="menu";draw();}
function goStart(){S.qq=shuf(Q).slice(0,S.n);S.cur=0;S.sel=null;S.conf=false;S.ans={};S.sc=0;S.done=0;S.phase="quiz";draw();}
function goPick(i){if(S.conf)return;S.sel=i;draw();}
function goCheck(){if(S.sel===null||S.conf)return;var q=S.qq[S.cur];var ok=S.sel===q.a;S.conf=true;S.ans[S.cur]={s:S.sel,a:q.a,ok:ok};if(ok)S.sc++;S.done++;draw();}
function goNext(){if(S.cur+1<S.qq.length){S.cur++;S.sel=null;S.conf=false;draw();}else{S.phase="result";draw();}}
function goPrev(){if(S.cur>0){S.cur--;var a=S.ans[S.cur];S.sel=a?a.s:null;S.conf=!!a;draw();}}
function goReview(){S.phase="review";S.filt="all";draw();}
function setFilt(f){S.filt=f;draw();}
function setN(n){S.n=n;draw();}

function draw(){if(S.phase==="menu")dMenu();else if(S.phase==="quiz")dQuiz();else if(S.phase==="result")dResult();else dReview();}

function cc(cat){return CC[cat]||{bg:"#1e2b3e",co:"#94a3b8",bo:"#334155"};}
function cl(cat){return CL[cat]||cat;}

function dMenu(){
  var pills=cats().map(function(cat){var c=cc(cat);return'<span class="s-pill" style="background:'+c.bg+';color:'+c.co+';border-color:'+c.bo+'">'+catQ(Q,cat).length+' '+cl(cat)+'</span>';}).join("");
  var btns=COUNTS.map(function(n){return'<button class="cnt-btn'+(S.n===n?" active":"")+'" onclick="setN('+n+')">'+n+'<small>pyta\u0144</small></button>';}).join("");
  document.getElementById("app").innerHTML=
    '<div class="menu-card"><div class="menu-icon">&#129658;</div>'+
    '<h1 class="menu-title">Choroby Wewn\u0119trzne</h1>'+
    '<p class="menu-sub">78 pyta\u0144 &middot; Interna &middot; Egzamin Zawodowy</p>'+
    '<div class="count-grid">'+btns+'</div>'+
    '<button class="start-btn" onclick="goStart()">Rozpocznij egzamin &#8594;</button>'+
    '<div class="stats-row">'+pills+'</div></div>';
}

function dQuiz(){
  var q=S.qq[S.cur];var tot=S.qq.length;var c=cc(q.c);var prog=(S.cur/tot*100).toFixed(1);
  var opts=q.o.map(function(txt,i){
    var cls="obtn";
    if(S.conf){if(i===q.a)cls="obtn cor";else if(i===S.sel)cls="obtn wrg";else cls="obtn dim";}
    else if(S.sel===i)cls="obtn sel";
    return'<button class="'+cls+'" onclick="goPick('+i+')"><span class="olbl">'+L[i]+'</span><span>'+txt+'</span></button>';
  }).join("");
  var fb="";
  if(S.conf){var an=S.ans[S.cur];fb='<div class="fb '+(an.ok?"ok":"no")+'">'+(an.ok?"&#10003; Dobrze! Odpowied\u017a: "+L[q.a]+". ":"&#10007; B\u0142\u0105d. Prawid\u0142owa to: "+L[q.a]+". ")+q.o[q.a]+"</div>";}
  var isLast=(S.cur+1>=tot);
  var ab=S.conf?'<button class="btn bs" onclick="goNext()">'+(isLast?"Wyniki &#127942;":"Nast\u0119pne &#8594;")+'</button>':'<button class="btn bp" onclick="goCheck()"'+(S.sel===null?" disabled":"")+'>Sprawd\u017a</button>';
  document.getElementById("app").innerHTML=
    '<div class="qhdr"><button class="btn bo" style="flex:none;padding:8px 12px;font-size:.78rem" onclick="goMenu()">&#10005;</button>'+
    '<div class="prog-w"><div class="prog-b" style="width:'+prog+'%"></div></div>'+
    '<span class="qcnt">'+(S.cur+1)+'/'+tot+'</span><span class="slive">'+S.sc+'/'+S.done+'</span></div>'+
    '<div class="qcard"><div class="qmeta"><span class="qnum">PYTANIE '+(S.cur+1)+'</span>'+
    '<span class="cbadge" style="background:'+c.bg+';color:'+c.co+';border-color:'+c.bo+'">'+cl(q.c)+'</span></div>'+
    '<p class="qtxt">'+q.t+'</p></div>'+
    '<div class="opts">'+opts+'</div>'+fb+
    '<div class="acts"><button class="btn bo" style="flex:none;padding:13px 17px" onclick="goPrev()"'+(S.cur===0?" disabled":"")+'>&#8592;</button>'+ab+'</div>';
}

function dResult(){
  var tot=S.qq.length;var pct=tot?Math.round(S.sc/tot*100):0;
  var em=pct>=80?"&#127942;":pct>=60?"&#128218;":"&#128170;";
  var col=pct>=80?"g":pct>=60?"y":"r";
  var msg=pct>=90?"Genialnie! Wiedza na poziomie eksperckim."
    :pct>=70?"Bardzo dobrze! Solidne przygotowanie."
    :pct>=50?"Zaliczone, ale przejrzyj b\u0142\u0119dy."
    :"Warto jeszcze raz przestudiowa\u0107 materia\u0142.";
  var bars=cats().map(function(cat){
    var cqs=catQ(S.qq,cat);if(!cqs.length)return"";
    var idxs=cqs.map(function(q){return S.qq.indexOf(q);});
    var ok=idxs.filter(function(i){return S.ans[i]&&S.ans[i].ok;}).length;
    var p=Math.round(ok/cqs.length*100);var fc=p>=80?"#4ade80":p>=60?"#facc15":"#f87171";
    return'<div class="crow"><div class="crowh"><span class="cname">'+cl(cat)+'</span><span style="font-weight:700;color:'+fc+'">'+ok+'/'+cqs.length+' ('+p+'%)</span></div><div class="cbarw"><div class="cbarf" style="width:'+p+'%;background:'+fc+'"></div></div></div>';
  }).join("");
  document.getElementById("app").innerHTML=
    '<div class="rcard"><div class="remo">'+em+'</div><div class="rpct '+col+'">'+pct+'%</div>'+
    '<p class="rmsg">'+msg+'</p>'+
    '<div class="rgrid">'+
    '<div class="rstat"><div class="v" style="color:#4ade80">'+S.sc+'</div><div class="l">Dobrych</div></div>'+
    '<div class="rstat"><div class="v" style="color:#f87171">'+(tot-S.sc)+'</div><div class="l">B\u0142\u0119dnych</div></div>'+
    '<div class="rstat"><div class="v" style="color:#60a5fa">'+tot+'</div><div class="l">\u0141\u0105cznie</div></div>'+
    '</div><div class="cbar"><div class="cbartit">Analiza kategorii</div>'+bars+'</div>'+
    '<div class="rbtns">'+
    '<button class="btn bp" onclick="goReview()">&#128203; Przejrzyj odpowiedzi</button>'+
    '<button class="btn bs" onclick="goStart()">&#128260; Powt\u00f3rz test ('+S.n+' pyt.)</button>'+
    '<button class="btn bo" onclick="goMenu()">\u2190 Menu g\u0142\u00f3wne</button>'+
    '</div></div>';
}

function dReview(){
  var filtered=S.qq.filter(function(_,i){if(S.filt==="wrong")return S.ans[i]&&!S.ans[i].ok;if(S.filt==="right")return S.ans[i]&&S.ans[i].ok;return true;});
  var pls=["all","wrong","right"].map(function(f){var lbl=f==="all"?"Wszystkie":f==="wrong"?"B\u0142\u0119dne":"Poprawne";return'<button class="fpill'+(S.filt===f?" act":"")+'" onclick="setFilt(\''+f+'\')">'+lbl+'</button>';}).join("");
  var items=filtered.map(function(rq){
    var oi=S.qq.indexOf(rq);var an=S.ans[oi];var ok=an&&an.ok;var c=cc(rq.c);
    return'<div class="ritem '+(ok?"ok":"er")+'"><div class="rmeta"><span class="rnum">PYT. '+rq.id+'</span>'+
    '<span class="cbadge" style="background:'+c.bg+';color:'+c.co+';border-color:'+c.bo+'">'+cl(rq.c)+'</span></div>'+
    '<p class="rq">'+rq.t+'</p>'+(!ok&&an?'<p class="ra w">&#10007; Wybra\u0142e\u015b: '+L[an.s]+'. '+rq.o[an.s]+'</p>':"")+
    '<p class="ra c">&#10003; Prawid\u0142owa: '+L[rq.a]+'. '+rq.o[rq.a]+'</p></div>';
  }).join("");
  document.getElementById("app").innerHTML=
    '<button class="bbk" onclick="S.phase=\'result\';draw()">\u2190 Wr\u00f3\u0107 do wynik\u00f3w</button>'+
    '<div class="rvhdr"><span class="rvtit">Analiza odpowiedzi</span><div class="fpills">'+pls+'</div></div>'+items;
}

draw();
</script>
