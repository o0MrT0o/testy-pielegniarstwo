<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test z Interny &ndash; Pielęgniarstwo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{min-height:100vh;background:#0d1117;font-family:'DM Sans',sans-serif;color:#e2e8f0;display:flex;justify-content:center;padding:24px 16px 60px;}
#app{width:100%;max-width:760px;}
.menu-card{background:linear-gradient(135deg,#161d2a,#1a2235);border:1px solid #2a3547;border-radius:20px;padding:44px 28px;text-align:center;margin-top:32px;}
.menu-icon{font-size:48px;margin-bottom:14px;}
.menu-title{font-family:'DM Serif Display',serif;font-size:1.9rem;color:#f0f4ff;margin-bottom:8px;line-height:1.2;}
.menu-sub{color:#7a8fa6;font-size:.9rem;margin-bottom:32px;}
.count-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px;}
@media(max-width:480px){.count-grid{grid-template-columns:repeat(3,1fr);}}
.cnt-btn{background:#1e2b3e;border:1px solid #2e3f56;border-radius:12px;color:#a8c0d8;padding:14px 6px;font-size:.95rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
.cnt-btn small{display:block;font-size:.65rem;color:#5a7a96;margin-top:2px;font-weight:400;}
.cnt-btn.active{background:#1e4080;border-color:#3b82f6;color:#93c5fd;}
.start-btn{width:100%;background:linear-gradient(135deg,#1d4ed8,#2563eb);border:none;border-radius:14px;color:#fff;font-size:1rem;font-weight:600;padding:15px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.stats-row{display:flex;gap:7px;justify-content:center;margin-top:20px;flex-wrap:wrap;}
.s-pill{border-radius:20px;padding:4px 11px;font-size:.72rem;font-weight:600;border:1px solid;}
.qhdr{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
.prog-w{flex:1;background:#1e2b3e;border-radius:8px;height:6px;overflow:hidden;}
.prog-b{height:100%;background:linear-gradient(90deg,#2563eb,#38bdf8);border-radius:8px;}
.qcnt{font-size:.82rem;color:#7a8fa6;white-space:nowrap;}
.slive{color:#facc15;font-size:.82rem;font-weight:600;white-space:nowrap;}
.qcard{background:#161d2a;border:1px solid #2a3547;border-radius:18px;padding:24px 22px 20px;margin-bottom:14px;}
.qmeta{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.qnum{font-size:.7rem;color:#3b82f6;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.cbadge{font-size:.68rem;padding:3px 10px;border-radius:20px;font-weight:600;border:1px solid;}
.qtxt{font-size:1rem;color:#dde8f5;line-height:1.65;}
.opts{display:flex;flex-direction:column;gap:9px;margin-bottom:14px;}
.obtn{display:flex;align-items:flex-start;gap:12px;border:1.5px solid #2a3547;border-radius:13px;padding:13px 15px;cursor:pointer;text-align:left;color:#c8d8e8;font-size:.92rem;line-height:1.5;font-family:'DM Sans',sans-serif;width:100%;transition:border-color .15s,background .15s;background:#161d2a;}
.obtn.sel{border-color:#3b82f6;background:#1a2d4e;}
.obtn.cor{border-color:#22c55e;background:#0f2d1a;color:#86efac;cursor:default;}
.obtn.wrg{border-color:#ef4444;background:#2d0f0f;color:#fca5a5;cursor:default;}
.obtn.dim{opacity:.4;cursor:default;}
.olbl{min-width:26px;height:26px;border-radius:8px;background:#1e2b3e;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;color:#7a8fa6;flex-shrink:0;margin-top:1px;}
.obtn.sel .olbl{background:#2563eb;color:#fff;}
.obtn.cor .olbl{background:#16a34a;color:#fff;}
.obtn.wrg .olbl{background:#dc2626;color:#fff;}
.fb{border-radius:10px;padding:12px 15px;font-size:.86rem;margin-bottom:14px;border-left:3px solid;line-height:1.55;}
.fb.ok{border-left-color:#22c55e;background:#0d1f12;color:#86efac;}
.fb.no{border-left-color:#ef4444;background:#1f0d0d;color:#fca5a5;}
.acts{display:flex;gap:9px;}
.btn{flex:1;padding:13px;border-radius:12px;border:none;font-size:.92rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
.btn:disabled{opacity:.3;cursor:not-allowed;}
.bo{background:transparent;border:1.5px solid #2a3547;color:#7a8fa6;}
.bp{background:linear-gradient(135deg,#1d4ed8,#2563eb);color:#fff;}
.bs{background:linear-gradient(135deg,#15803d,#16a34a);color:#fff;}
.rcard{background:#161d2a;border:1px solid #2a3547;border-radius:20px;padding:36px 22px;text-align:center;margin-top:12px;}
.remo{font-size:46px;margin-bottom:12px;}
.rpct{font-family:'DM Serif Display',serif;font-size:4rem;font-weight:400;line-height:1;margin-bottom:6px;}
.g{color:#4ade80;}.y{color:#facc15;}.r{color:#f87171;}
.rmsg{color:#7a8fa6;font-size:.88rem;margin-bottom:20px;}
.rgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.rstat{background:#1e2b3e;border-radius:12px;padding:14px 8px;}
.rstat .v{font-size:1.5rem;font-weight:700;margin-bottom:3px;}
.rstat .l{font-size:.7rem;color:#6b8299;}
.cbar{background:#111827;border-radius:12px;padding:14px 16px;margin-bottom:16px;text-align:left;}
.cbartit{font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#475569;margin-bottom:11px;}
.crow{margin-bottom:9px;}
.crowh{display:flex;justify-content:space-between;font-size:.77rem;margin-bottom:4px;}
.cname{color:#94a3b8;}
.cbarw{height:5px;background:#1e2b3e;border-radius:999px;overflow:hidden;}
.cbarf{height:100%;border-radius:999px;}
.rbtns{display:flex;flex-direction:column;gap:9px;}
.bbk{display:flex;align-items:center;gap:6px;background:transparent;border:1.5px solid #2a3547;border-radius:10px;color:#7a8fa6;padding:8px 13px;font-size:.82rem;cursor:pointer;font-family:'DM Sans',sans-serif;margin-bottom:16px;}
.rvhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;gap:8px;flex-wrap:wrap;}
.rvtit{font-family:'DM Serif Display',serif;font-size:1.3rem;color:#f0f4ff;}
.fpills{display:flex;gap:6px;flex-wrap:wrap;}
.fpill{padding:4px 11px;border-radius:20px;border:1px solid #2a3547;background:transparent;color:#7a8fa6;font-size:.75rem;cursor:pointer;font-family:'DM Sans',sans-serif;}
.fpill.act{background:#1e2b3e;border-color:#3b82f6;color:#60a5fa;}
.ritem{background:#161d2a;border:1px solid #2a3547;border-radius:13px;padding:14px 16px;margin-bottom:9px;}
.ritem.ok{border-left:3px solid #22c55e;}
.ritem.er{border-left:3px solid #ef4444;}
.rq{font-size:.87rem;color:#c8d8e8;margin-bottom:7px;line-height:1.5;}
.ra{font-size:.81rem;margin-bottom:3px;}
.ra.c{color:#4ade80;}.ra.w{color:#f87171;}
.rmeta{display:flex;gap:7px;align-items:center;margin-bottom:7px;flex-wrap:wrap;}
.rnum{font-size:.68rem;color:#5a7a96;font-weight:600;}
</style>
</head>
<body>
<div id="app"></div>
<script>
var L = ["A", "B", "C", "D"];
var CC = {
  "Kardiologia": {bg:"#3d1e1e",co:"#fca5a5",bo:"#dc2626"},
  "Diabetologia": {bg:"#1e3a5f",co:"#60a5fa",bo:"#2563eb"},
  "Gastroenterologia": {bg:"#1e3d2f",co:"#4ade80",bo:"#16a34a"},
  "Reumatologia": {bg:"#2d1e3d",co:"#c084fc",bo:"#9333ea"},
  "Ogólne": {bg:"#2d2a1e",co:"#facc15",bo:"#ca8a04"}
};
var CL = {
  "Kardiologia": "Kardiologia",
  "Diabetologia": "Diabetologia",
  "Gastroenterologia": "Gastroenterologia",
  "Reumatologia": "Reumatologia",
  "Ogólne": "Pielęgniarstwo Ogólne"
};
var COUNTS = [5, 10, 15];

var Q = [
  {id:1, c:"Kardiologia", t:"Które z poniższych twierdzeń dotyczących regularnych ćwiczeń aerobowych jest BŁĘDNE?", o:["Zwiększają insulinoodporność","Obniżają frakcję LDL cholesterolu","Zwiększają frakcję HDL cholesterolu","Obniżają ciśnienie tętnicze"], a:0},
  {id:2, c:"Diabetologia", t:"Podawanie insuliny krótko działającej w pompie infuzyjnej lub w powtarzanych małych dawkach dożylnie, nawadnianie pacjenta i wyrównanie zaburzeń wodno-elektrolitowych to postępowanie właściwe w przypadku:", o:["Hipoglikemii z zaburzeniami świadomości","Hipoglikemii bez zaburzeń świadomości","Niewyrównanej cukrzycy i kwasicy ketonowej","Hipokaliemii"], a:2},
  {id:3, c:"Diabetologia", t:"Wskaźnik BMI = 27,3 u pacjenta dorosłego oznacza:", o:["Nadwagę","Otyłość","Ciężką otyłość","Prawidłową masę ciała"], a:0},
  {id:4, c:"Ogólne", t:"Warunkiem dokonania prawidłowego pomiaru ciśnienia tętniczego są wszystkie poniższe, ZA WYJĄTKIEM:", o:["Powstrzymania się od picia kawy na 20-30 min przed badaniem","Powstrzymania się od wysiłku na 10-20 min przed badaniem","Dostosowania mankietu do wieku i obwodu ramienia","Przyjęcia pozycji, aby tętnica była PONIŻEJ poziomu serca"], a:3},
  {id:5, c:"Kardiologia", t:"Zaznacz BŁĘDNE twierdzenie dotyczące ostrych zespołów wieńcowych:", o:["W OZW przeciwbólowo można podawać wszystkie NLPZ","Przeciwwskazaniem do stosowania nitrogliceryny jest zawał prawej komory","Leczenie fibrynolityczne w NSTEMI jest zalecane","Wczesne leczenie obejmuje zawsze podanie tlenu"], a:0},
  {id:6, c:"Diabetologia", t:"Oznaczenie hemoglobiny glikowanej (HbA1c) jest:", o:["Konieczne dla oceny stopnia otyłości","Pomocne w ocenie stopnia wyrównania cukrzycy","Niezbędne dla rozpoznania zawału serca","Badaniem wyłącznie naukowym, bez wartości praktycznej"], a:1},
  {id:7, c:"Diabetologia", t:"Wskaż prawdziwe twierdzenie dotyczące cukrzycy typu 2:", o:["Daje częste powikłania naczyniowe","Chroni przed chorobą wieńcową","Nie ma wpływu na stan naczyń","Wpływa niekorzystnie wyłącznie na naczynia żylne"], a:0},
  {id:8, c:"Reumatologia", t:"Osteoporoza występuje najczęściej u kobiet:", o:["Otyłych","Młodych, bez innych schorzeń","Starszych, szczupłych, palących papierosy","W wieku średnim z wysokim poziomem cholesterolu"], a:2},
  {id:9, c:"Gastroenterologia", t:"Kamica pęcherzyka żółciowego u większości pacjentów najczęściej przebiega:", o:["Bezobjawowo","Z przewlekłą żółtaczką","Z codziennymi objawami kolki żółciowej","Z towarzyszącym ostrym zapaleniem trzustki"], a:0},
  {id:10, c:"Kardiologia", t:"Spośród wymienionych, czynnikiem ryzyka choroby niedokrwiennej serca NIE JEST:", o:["Cukrzyca","Nadciśnienie tętnicze","Nadczynność tarczycy","Hiperlipidemia"], a:2},
  {id:11, c:"Gastroenterologia", t:"Nagły, ostry ból brzucha z towarzyszącym spadkiem ciśnienia, potami i napięciem powłok u pacjenta z chorobą wrzodową sugeruje:", o:["Perforację wrzodu żołądka","Ciężki zastój pokarmu na skutek zaburzeń opróżniania","Krytyczne rozdęcie żołądka gazami","Zapalenie błony śluzowej przełyku"], a:0},
  {id:12, c:"Gastroenterologia", t:"Przygotowując pacjenta do gastroskopii, pielęgniarka m.in.:", o:["Układa pacjenta na lewym boku, sprawdza czy jest na czczo i wyjmuje protezy","Wykonuje wlew oczyszczający i podaje środek odgazowujący","Układa pacjenta w pozycji embrionalnej na prawym boku","Układa pacjenta na wznak i podaje leki znieczulające ogólnie"], a:0},
  {id:13, c:"Kardiologia", t:"Obserwując pacjenta z podejrzeniem zawału mięśnia sercowego, szczególną uwagę należy zwrócić na:", o:["Ból w klatce piersiowej >20 min, poty i silny lęk","Ból promieniujący wyłącznie do krtani, obniżenie leukocytozy","Szarość powłok, ból w podbrzuszu, hiperglikemię","Niemiarowość, rytm cwałowy i wysoką gorączkę (>39 st.)"], a:0},
  {id:14, c:"Diabetologia", t:"Jednym z pierwszych symptomów hiperglikemii (przecukrzenia) będzie:", o:["Światłowstręt i bóle głowy","Bóle okolicy lędźwiowej i wymioty","Wielomocz i wzmożone pragnienie","Drżenie rąk i silne pocenie się"], a:2},
  {id:15, c:"Diabetologia", t:"Bezpośrednio przed posiłkiem (0-15 minut) lub w czasie posiłku zaleca się podanie insuliny:", o:["Długodziałającej (np. Lantus)","Krótkodziałającej (lub analogowej szybkiej)","Izofanowej (NPH)","Mieszanki ludzkiej 45 min przed posiłkiem"], a:1}
];

var S = { v: "menu", n: 15, qq: [], ans: [], step: 0, filt: "all" };

function render() {
  var app = document.getElementById('app');
  if(S.v==="menu") app.innerHTML = dMenu();
  else if(S.v==="quiz") app.innerHTML = dQuiz();
  else if(S.v==="res") app.innerHTML = dResult();
  else if(S.v==="rev") app.innerHTML = dReview();
}

function goStart(n) {
  S.n = n;
  S.v = "quiz";
  S.step = 0;
  S.ans = [];
  var sh = Q.slice().sort(function(){return 0.5-Math.random();});
  S.qq = sh.slice(0, Math.min(S.n, Q.length));
  S.n = S.qq.length;
  render();
}

function goMenu() {
  S.v = "menu";
  render();
}

function goRes() {
  S.v = "res";
  render();
}

function goRev() {
  S.v = "rev";
  S.filt = "all";
  render();
}

function setFilt(f) {
  S.filt = f;
  render();
}

function selectOpt(idx) {
  if(S.ans[S.step]) return;
  var q = S.qq[S.step];
  var ok = (idx === q.a);
  S.ans[S.step] = { o: idx, ok: ok };
  render();
}

function nextQ() {
  if(S.step < S.n - 1) {
    S.step++;
    render();
  } else {
    goRes();
  }
}

function cc(cat) {
  return CC[cat] || {bg:"#333",co:"#fff",bo:"#555"};
}

function dMenu() {
  var btns = COUNTS.map(function(c){
    return '<button class="cnt-btn" onclick="goStart('+c+')">'+c+'<small>pytań</small></button>';
  }).join('');
  return '<div class="menu-card"><div class="menu-icon">🩺</div><h1 class="menu-title">Test z Interny</h1><p class="menu-sub">Wybierz liczbę pytań i rozpocznij naukę</p><div class="count-grid">'+btns+'</div><button class="start-btn" onclick="goStart(15)">Rozpocznij test (Wszystkie 15)</button></div>';
}

function dQuiz() {
  var q = S.qq[S.step];
  var an = S.ans[S.step];
  var pct = ((S.step)/S.n)*100;
  
  var opts = q.o.map(function(opt, i){
    var cName = "obtn";
    if(an) {
      if(i === q.a) cName += " cor";
      else if(i === an.o) cName += " wrg";
      else cName += " dim";
    }
    return '<button class="'+cName+'" onclick="selectOpt('+i+')"><div class="olbl">'+L[i]+'</div><div>'+opt+'</div></button>';
  }).join('');
  
  var fb = "";
  var btn = "";
  if(an) {
    if(an.ok) fb = '<div class="fb ok">Świetnie! Poprawna odpowiedź.</div>';
    else fb = '<div class="fb no">Niestety, poprawna odpowiedź to: '+L[q.a]+'</div>';
    
    var btnText = (S.step === S.n - 1) ? "Zakończ test" : "Następne pytanie \u2192";
    btn = '<div class="acts"><button class="btn bp" onclick="nextQ()">'+btnText+'</button></div>';
  } else {
    btn = '<div class="acts"><button class="btn bp" disabled>Wybierz odpowiedź</button></div>';
  }
  
  var catStyl = cc(q.c);
  var catBadge = '<span class="cbadge" style="background:'+catStyl.bg+';color:'+catStyl.co+';border-color:'+catStyl.bo+'">'+CL[q.c]+'</span>';

  return '<div class="qhdr"><div class="prog-w"><div class="prog-b" style="width:'+pct+'%"></div></div><div class="qcnt">'+(S.step+1)+' / '+S.n+'</div></div>'+
         '<div class="qcard"><div class="qmeta"><span class="qnum">PYTANIE '+(S.step+1)+'</span>'+catBadge+'</div>'+
         '<div class="qtxt">'+q.t+'</div></div>'+
         '<div class="opts">'+opts+'</div>'+fb+btn;
}

function dResult() {
  var score = S.ans.filter(function(a){return a.ok;}).length;
  var pct = Math.round((score/S.n)*100);
  var emo = pct>=80 ? "🏆" : pct>=50 ? "👍" : "📚";
  var clr = pct>=80 ? "g" : pct>=50 ? "y" : "r";
  
  return '<div class="rcard"><div class="remo">'+emo+'</div><div class="rpct '+clr+'">'+pct+'%</div><div class="rmsg">Zdobyto '+score+' z '+S.n+' punktów</div>'+
         '<div class="rbtns"><button class="btn bp" onclick="goRev()">Przejrzyj odpowiedzi</button><button class="btn bs" onclick="goStart(S.n)">&#128260; Zagraj ponownie ('+S.n+' pytań)</button><button class="btn bo" onclick="goMenu()">\u2190 Menu główne</button></div></div>';
}

function dReview() {
  var filtered = S.qq.filter(function(_, i){
    if(S.filt==="wrong") return S.ans[i] && !S.ans[i].ok;
    if(S.filt==="right") return S.ans[i] && S.ans[i].ok;
    return true;
  });
  
  var pls = ["all", "wrong", "right"].map(function(f){
    var lbl = f==="all"?"Wszystkie":f==="wrong"?"Błędne":"Poprawne";
    var act = S.filt===f?" act":"";
    return '<button class="fpill'+act+'" onclick="setFilt(\''+f+'\')">'+lbl+'</button>';
  }).join('');
  
  var items = filtered.map(function(rq){
    var idx = S.qq.indexOf(rq);
    var an = S.ans[idx];
    var isOk = an && an.ok;
    var cSt = cc(rq.c);
    var bdg = '<span class="cbadge" style="background:'+cSt.bg+';color:'+cSt.co+';border-color:'+cSt.bo+'">'+CL[rq.c]+'</span>';
    
    var userAns = an ? rq.o[an.o] : "Brak";
    var corAns = rq.o[rq.a];
    
    var ansHtml = isOk ? '<div class="ra c">Twój wybór: '+userAns+' (Poprawnie)</div>' : '<div class="ra w">Twój wybór: '+userAns+'</div><div class="ra c">Poprawna: '+corAns+'</div>';
    
    return '<div class="ritem '+(isOk?"ok":"er")+'"><div class="rmeta"><span class="rnum">PYT. '+(idx+1)+'</span>'+bdg+'</div><div class="rq">'+rq.t+'</div>'+ansHtml+'</div>';
  }).join('');
  
  if(!items) items = '<div style="text-align:center;color:#7a8fa6;padding:20px;">Brak pytań w tej kategorii.</div>';
  
  return '<button class="bbk" onclick="goRes()">\u2190 Wróć do wyniku</button><div class="rvhdr"><div class="rvtit">Przegląd odpowiedzi</div><div class="fpills">'+pls+'</div></div>'+items;
}

window.onload = function() {
  render();
};
</script>
</body>
</html>
