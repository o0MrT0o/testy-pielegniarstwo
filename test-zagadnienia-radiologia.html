 {id:38,c:"Opieka w RT",t:"Na co zwr\u00f3ci\u0107 uwag\u0119 edukuj\u0105c pacjenta przed radioterapi\u0105?",o:["Tylko na dawk\u0119","Piel\u0119gnacj\u0119 sk\u00f3ry, objawy alarmowe, diet\u0119, zm\u0119czenie i zakaz palenia","Wy\u0142\u0105cznie na diet\u0119","Tylko na unikanie wysi\u0142ku"],a:1},
 {id:39,c:"Opieka w RT",t:"Rola piel\u0119gniarki w przygotowaniu pacjenta do radioterapii?",o:["Tylko mierzy ci\u015bnienie","Edukuje, udziela wsparcia emocjonalnego, ocenia stan og\u00f3lny","Planuje dawki promieniowania","Obs\u0142uguje akcelerator liniowy"],a:1},
 {id:40,c:"Opieka w RT",t:"Kt\u00f3re dzia\u0142anie jest NIEPRAWID\u0141OWE w piel\u0119gnacji napromieniowanej sk\u00f3ry?",o:["Mycie letni\u0105 wod\u0105 i \u0142agodnym myd\u0142em","Osuszanie przez delikatne dotykanie r\u0119cznikiem","P\u0142ukanie jamy ustnej spirytusem przy dolegliwo\u015bciach po RT","Stosowanie emoliento\u00f3w"],a:2}
];

/* ── STATE ── */
var S={phase:"menu",qq:[],cur:0,sel:null,conf:false,ans:{},sc:0,done:0,n:20,filt:"all"};

function shuf(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}

function cats(){var r=[];Q.forEach(function(q){if(r.indexOf(q.c)<0)r.push(q.c);});return r;}
function catQ(qq,cat){return qq.filter(function(q){return q.c===cat;});}

/* ── ACTIONS ── */
function goMenu(){S.phase="menu";draw();}
function goStart(){
  S.qq=shuf(Q).slice(0,S.n);S.cur=0;S.sel=null;S.conf=false;
  S.ans={};S.sc=0;S.done=0;S.phase="quiz";draw();
}
function goPick(i){if(S.conf)return;S.sel=i;draw();}
function goCheck(){
  if(S.sel===null||S.conf)return;
  var q=S.qq[S.cur];var ok=S.sel===q.a;
  S.conf=true;S.ans[S.cur]={s:S.sel,a:q.a,ok:ok};
  if(ok)S.sc++;S.done++;draw();
}
function goNext(){
  if(S.cur+1<S.qq.length){S.cur++;S.sel=null;S.conf=false;draw();}
  else{S.phase="result";draw();}
}
function goPrev(){
  if(S.cur>0){
    S.cur--;var a=S.ans[S.cur];
    S.sel=a?a.s:null;S.conf=!!a;draw();
  }
}
function goReview(){S.phase="review";S.filt="all";draw();}
function setFilt(f){S.filt=f;draw();}
function setN(n){S.n=n;draw();}

/* ── DRAW ── */
function draw(){
  if(S.phase==="menu")dMenu();
  else if(S.phase==="quiz")dQuiz();
  else if(S.phase==="result")dResult();
  else dReview();
}

function cc(cat){return CC[cat]||{bg:"#1e2b3e",co:"#94a3b8",bo:"#334155"};}
function cl(cat){return CL[cat]||cat;}

function dMenu(){
  var pills=cats().map(function(cat){
    var c=cc(cat);
    return '<span class="s-pill" style="background:'+c.bg+';color:'+c.co+';border-color:'+c.bo+'">'+
      catQ(Q,cat).length+' '+cl(cat)+'</span>';
  }).join("");
  var btns=COUNTS.map(function(n){
    return '<button class="cnt-btn'+(S.n===n?" active":"")+'" onclick="setN('+n+')">'+n+'<small>pyta\u0144</small></button>';
  }).join("");
  document.getElementById("app").innerHTML=
    '<div class="menu-card">'+
    '<div class="menu-icon">&#128203;</div>'+
    '<h1 class="menu-title">Zagadnienia egzaminacyjne</h1>'+
    '<p class="menu-sub">40 pyta\u0144 &middot; 5 kategorii &middot; Radiologia Semestr letni</p>'+
    '<div class="count-grid">'+btns+'</div>'+
    '<button class="start-btn" onclick="goStart()">Rozpocznij test &#8594;</button>'+
    '<div class="stats-row">'+pills+'</div>'+
    '</div>';
}

function dQuiz(){
  var q=S.qq[S.cur];var tot=S.qq.length;
  var c=cc(q.c);var prog=(S.cur/tot*100).toFixed(1);
  var opts=q.o.map(function(txt,i){
    var cls="obtn";
    if(S.conf){
      if(i===q.a)cls="obtn cor";
      else if(i===S.sel)cls="obtn wrg";
      else cls="obtn dim";
    }else if(S.sel===i)cls="obtn sel";
    return '<button class="'+cls+'" onclick="goPick('+i+')">'+
      '<span class="olbl">'+L[i]+'</span><span>'+txt+'</span></button>';
  }).join("");
  var fb="";
  if(S.conf){
    var an=S.ans[S.cur];
    fb='<div class="fb '+(an.ok?"ok":"no")+'">'+(an.ok
      ?"&#10003; Poprawna odpowied\u017a! "+L[q.a]+". "+q.o[q.a]
      :"&#10007; B\u0142\u0105d. Prawid\u0142owa: "+L[q.a]+". "+q.o[q.a])+"</div>";
  }
  var isLast=(S.cur+1>=tot);
  var actionBtns=S.conf
    ?'<button class="btn bs" onclick="goNext()">'+(isLast?"Zako\u0144cz &#10003;":"Nast\u0119pne &#8594;")+'</button>'
    :'<button class="btn bp" onclick="goCheck()" '+(S.sel===null?"disabled":"")+'>Sprawd\u017a</button>';
  document.getElementById("app").innerHTML=
    '<div class="qhdr">'+
    '<button class="btn bo" style="flex:none;padding:8px 12px;font-size:.78rem" onclick="goMenu()">&#10005;</button>'+
    '<div class="prog-w"><div class="prog-b" style="width:'+prog+'%"></div></div>'+
    '<span class="qcnt">'+(S.cur+1)+'/'+tot+'</span>'+
    '<span class="slive">'+S.sc+'/'+S.done+'</span>'+
    '</div>'+
    '<div class="qcard">'+
    '<div class="qmeta"><span class="qnum">PYTANIE '+(S.cur+1)+'</span>'+
    '<span class="cbadge" style="background:'+c.bg+';color:'+c.co+';border-color:'+c.bo+'">'+cl(q.c)+'</span></div>'+
    '<p class="qtxt">'+q.t+'</p>'+
    '</div>'+
    '<div class="opts">'+opts+'</div>'+
    fb+
    '<div class="acts">'+
    '<button class="btn bo" style="flex:none;padding:13px 17px" onclick="goPrev()" '+(S.cur===0?"disabled":"")+'>&#8592;</button>'+
    actionBtns+
    '</div>';
}

function dResult(){
  var tot=S.qq.length;
  var pct=tot?Math.round(S.sc/tot*100):0;
  var em=pct>=80?"&#127942;":pct>=60?"&#128218;":"&#128170;";
  var col=pct>=80?"g":pct>=60?"y":"r";
  var msg=pct>=90?"Doskonale! Jeste\u015b gotowy/a na egzamin."
    :pct>=75?"Bardzo dobrze! Jeszcze troch\u0119 powt\u00f3rze\u0144."
    :pct>=60?"Niez\u0142e, ale warto przejrze\u0107 b\u0142\u0119dy."
    :"Zalecane dodatkowe powt\u00f3rzenie.";
  var barsHtml=cats().map(function(cat){
    var cqs=catQ(S.qq,cat);if(!cqs.length)return"";
    var idxs=cqs.map(function(q){return S.qq.indexOf(q);});
    var ok=idxs.filter(function(i){return S.ans[i]&&S.ans[i].ok;}).length;
    var p=Math.round(ok/cqs.length*100);
    var fc=p>=80?"#4ade80":p>=60?"#facc15":"#f87171";
    return '<div class="crow">'+
      '<div class="crowh"><span class="cname">'+cl(cat)+'</span>'+
      '<span style="font-weight:700;color:'+fc+'">'+ok+'/'+cqs.length+' ('+p+'%)</span></div>'+
      '<div class="cbarw"><div class="cbarf" style="width:'+p+'%;background:'+fc+'"></div></div>'+
      '</div>';
  }).join("");
  document.getElementById("app").innerHTML=
    '<div class="rcard">'+
    '<div class="remo">'+em+'</div>'+
    '<div class="rpct '+col+'">'+pct+'%</div>'+
    '<p class="rmsg">'+msg+'</p>'+
    '<div class="rgrid">'+
    '<div class="rstat"><div class="v" style="color:#4ade80">'+S.sc+'</div><div class="l">Poprawnych</div></div>'+
    '<div class="rstat"><div class="v" style="color:#f87171">'+(tot-S.sc)+'</div><div class="l">B\u0142\u0119dnych</div></div>'+
    '<div class="rstat"><div class="v" style="color:#60a5fa">'+tot+'</div><div class="l">\u0141\u0105cznie</div></div>'+
    '</div>'+
    '<div class="cbar"><div class="cbartit">Wyniki wg kategorii</div>'+barsHtml+'</div>'+
    '<div class="rbtns">'+
    '<button class="btn bp" onclick="goReview()">&#128203; Przejrzyj odpowiedzi</button>'+
    '<button class="btn bs" onclick="goStart()">&#128260; Nowy test ('+S.n+' pyta\u0144)</button>'+
    '<button class="btn bo" onclick="goMenu()">\u2190 Menu</button>'+
    '</div></div>';
}

function dReview(){
  var filtered=S.qq.filter(function(_,i){
    if(S.filt==="wrong")return S.ans[i]&&!S.ans[i].ok;
    if(S.filt==="right")return S.ans[i]&&S.ans[i].ok;
    return true;
  });
  var pls=["all","wrong","right"].map(function(f){
    var lbl=f==="all"?"Wszystkie":f==="wrong"?"B\u0142\u0119dne":"Poprawne";
    return '<button class="fpill'+(S.filt===f?" act":"")+'" onclick="setFilt(\''+f+'\')">'+lbl+'</button>';
  }).join("");
  var items=filtered.map(function(rq){
    var oi=S.qq.indexOf(rq);var an=S.ans[oi];var ok=an&&an.ok;
    var c=cc(rq.c);
    return '<div class="ritem '+(ok?"ok":"er")+'">'+
      '<div class="rmeta"><span class="rnum">PYT. '+rq.id+'</span>'+
      '<span class="cbadge" style="background:'+c.bg+';color:'+c.co+';border-color:'+c.bo+'">'+cl(rq.c)+'</span></div>'+
      '<p class="rq">'+rq.t+'</p>'+
      (!ok&&an?'<p class="ra w">&#10007; Twoja: '+L[an.s]+'. '+rq.o[an.s]+'</p>':"")+
      '<p class="ra c">&#10003; Prawid\u0142owa: '+L[rq.a]+'. '+rq.o[rq.a]+'</p>'+
      '</div>';
  }).join("");
  document.getElementById("app").innerHTML=
    '<button class="bbk" onclick="S.phase=\'result\';draw()">\u2190 Powr\u00f3t do wynik\u00f3w</button>'+
    '<div class="rvhdr"><span class="rvtit">Przegl\u0105d odpowiedzi</span>'+
    '<div class="fpills">'+pls+'</div></div>'+
    items;
}

draw();
</script>
</body>
</html>
